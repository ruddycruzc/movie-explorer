<article
  class="
    bg-white
    rounded-2xl
    overflow-hidden
    shadow-lg
    hover:shadow-2xl
    hover:-translate-y-2
    transition-all
    duration-300
  "
>
  <img
    [src]="image"
    [alt]="title"
    class="w-full h-80 object-cover"
  />

  <div class="p-4">
    <h3 class="font-bold text-lg mb-2">
      {{ title }}
    </h3>

    <p class="text-yellow-500 font-semibold">
      ⭐ {{ rating }}
    </p>
  </div>
</article>
